<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GoldScan Pro</title>

<!-- QR Scanner library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<!-- Excel export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --gold: #D4A843;
    --gold-dim: rgba(212,168,67,0.15);
    --gold-border: rgba(212,168,67,0.25);
    --bg: #131110;
    --surface: #1E1A17;
    --surface2: #2A2420;
    --text: #F5EDD8;
    --text-dim: rgba(245,237,216,0.4);
    --red: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ─────────────────────────────────────────────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--gold-border);
    gap: 10px;
    flex-shrink: 0;
    animation: slideDown 0.4s ease both;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .logo-icon { font-size: 20px; }
  .logo-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: -0.3px;
  }

  .count-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--gold);
    background: var(--gold-dim);
    border: 1px solid var(--gold-border);
    border-radius: 20px;
    padding: 5px 12px;
    min-width: 90px;
    text-align: center;
    transition: all 0.2s;
  }

  .torch-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: 1px solid var(--gold-border);
    background: transparent;
    color: var(--gold);
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
  }
  .torch-btn.active { background: var(--gold-dim); border-color: rgba(212,168,67,0.5); }

  /* ── CAMERA ──────────────────────────────────────────────────────────── */
  .camera-wrap {
    position: relative;
    flex-shrink: 0;
    height: 230px;
    background: #000;
    overflow: hidden;
  }

  #qr-reader {
    width: 100% !important;
    height: 230px !important;
  }
  #qr-reader video {
    width: 100% !important;
    height: 230px !important;
    object-fit: cover !important;
  }
  /* Hide the default html5-qrcode UI chrome */
  #qr-reader img,
  #qr-reader > div:not(#qr-reader__scan_region) { display: none !important; }
  #qr-reader__scan_region { border: none !important; }
  #qr-reader__scan_region > img { display: none !important; }

  /* Corner viewfinder overlay */
  .viewfinder {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .vf-corner {
    position: absolute;
    width: 22px; height: 22px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.9;
  }
  .vf-tl { top: 28px; left: 28px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .vf-tr { top: 28px; right: 28px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .vf-bl { bottom: 28px; left: 28px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
  .vf-br { bottom: 28px; right: 28px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

  /* Scan line animation */
  .scan-line {
    position: absolute;
    left: 28px; right: 28px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    animation: scanLine 2s ease-in-out infinite;
    top: 28px;
  }
  @keyframes scanLine {
    0% { top: 28px; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: calc(100% - 28px); opacity: 0; }
  }

  /* Flash banner */
  .flash-banner {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: var(--gold);
    color: #131110;
    padding: 9px 16px;
    display: flex; align-items: center; gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 13px; font-weight: 500;
    transform: translateY(100%);
    transition: transform 0.2s ease;
    z-index: 10;
  }
  .flash-banner.show { transform: translateY(0); }
  .flash-banner span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── LIST SECTION ────────────────────────────────────────────────────── */
  .list-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--gold-border);
    flex-shrink: 0;
  }
  .list-header-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }
  .list-header-icon { font-size: 16px; }

  .clear-btn {
    font-size: 12px;
    color: #e74c3c;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    padding: 4px 8px;
    border-radius: 6px;
  }

  .list-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    -webkit-overflow-scrolling: touch;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: var(--text-dim);
  }
  .empty-state-icon { font-size: 40px; opacity: 0.3; }
  .empty-state-text { font-size: 14px; }

  .item-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface2);
    border: 1px solid var(--gold-border);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
    animation: slideIn 0.22s ease both;
    position: relative;
    overflow: hidden;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(16px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .item-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    background: var(--gold-dim);
    border-radius: 6px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .item-info { flex: 1; min-width: 0; }
  .item-code {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-time {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .item-del {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    flex-shrink: 0;
    transition: color 0.15s;
  }
  .item-del:active { color: #e74c3c; }

  /* ── BOTTOM BAR ──────────────────────────────────────────────────────── */
  .bottombar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
    border-top: 1px solid var(--gold-border);
    flex-shrink: 0;
    animation: slideUp 0.4s ease 0.1s both;
  }

  .hint-text {
    flex: 1;
    font-size: 13px;
    color: var(--text-dim);
  }

  .done-btn {
    height: 48px;
    padding: 0 28px;
    background: var(--gold);
    color: #131110;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: opacity 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .done-btn:active { transform: scale(0.96); opacity: 0.85; }

  /* ── RESULTS SCREEN ──────────────────────────────────────────────────── */
  #results-screen {
    display: none;
    flex-direction: column;
    height: 100dvh;
  }
  #results-screen.visible { display: flex; }

  .results-header {
    padding: 18px 18px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--gold-border);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .results-icon {
    width: 46px; height: 46px;
    background: var(--gold-dim);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .results-title { font-size: 20px; font-weight: 700; }
  .results-sub { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--gold); }

  .scan-again-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--gold-border);
    color: var(--gold);
    border-radius: 10px;
    padding: 8px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }

  .results-list { flex: 1; overflow-y: auto; padding: 10px 12px; }

  .results-footer {
    padding: 14px 16px;
    background: var(--surface);
    border-top: 1px solid var(--gold-border);
    flex-shrink: 0;
  }
  .export-btn {
    width: 100%;
    height: 54px;
    background: var(--gold);
    color: #131110;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .export-btn:active { transform: scale(0.97); opacity: 0.85; }
  .export-btn:disabled { opacity: 0.5; }

  /* ── ANIMATIONS ──────────────────────────────────────────────────────── */
  @keyframes slideDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideUp   { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:translateY(0); } }

  /* ── SCROLLBAR ───────────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 4px; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<!--  SCANNER SCREEN                                                        -->
<!-- ═══════════════════════════════════════════════════════════════════════ -->
<div id="scanner-screen" style="display:flex;flex-direction:column;height:100dvh;">

  <!-- Top bar -->
  <div class="topbar">
    <div class="logo">
      <span class="logo-icon">💎</span>
      <span class="logo-text">GoldScan Pro</span>
    </div>
    <div class="count-badge" id="count-badge">0 scanned</div>
    <button class="torch-btn" id="torch-btn" title="Toggle torch">🔦</button>
  </div>

  <!-- Camera -->
  <div class="camera-wrap">
    <div id="qr-reader"></div>
    <div class="viewfinder">
      <div class="vf-corner vf-tl"></div>
      <div class="vf-corner vf-tr"></div>
      <div class="vf-corner vf-bl"></div>
      <div class="vf-corner vf-br"></div>
      <div class="scan-line"></div>
    </div>
    <div class="flash-banner" id="flash-banner">
      <span>✓</span><span id="flash-text"></span>
    </div>
  </div>

  <!-- List header -->
  <div class="list-header">
    <span class="list-header-icon">📋</span>
    <span class="list-header-label">Scanned Tags</span>
    <button class="clear-btn" id="clear-btn" onclick="clearAll()" style="display:none">Clear all</button>
  </div>

  <!-- Scrollable list -->
  <div class="list-wrap" id="item-list">
    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">📷</div>
      <div class="empty-state-text">Point camera at a QR code</div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottombar">
    <span class="hint-text" id="hint-text">Scanning…</span>
    <button class="done-btn" onclick="goToResults()">
      <span>✓</span> Done
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<!--  RESULTS SCREEN                                                        -->
<!-- ═══════════════════════════════════════════════════════════════════════ -->
<div id="results-screen">
  <div class="results-header">
    <div class="results-icon">✅</div>
    <div>
      <div class="results-title">Scan Complete</div>
      <div class="results-sub" id="results-sub">0 items scanned</div>
    </div>
    <button class="scan-again-btn" onclick="scanAgain()">📷 Scan Again</button>
  </div>

  <div class="results-list" id="results-list"></div>

  <div class="results-footer">
    <button class="export-btn" id="export-btn" onclick="exportExcel()">
      <span>⬇</span> Download Excel Sheet
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<script>
// ── State ────────────────────────────────────────────────────────────────
const scannedItems = [];
const scannedCodes = new Set();
let flashTimer = null;
let torchOn = false;
let scanner = null;

// ── Init scanner ─────────────────────────────────────────────────────────
function initScanner() {
  scanner = new Html5Qrcode("qr-reader");

  const config = {
    fps: 15,
    qrbox: { width: 220, height: 220 },
    aspectRatio: window.innerWidth / 230,
    disableFlip: false,
  };

  scanner.start(
    { facingMode: "environment" },
    config,
    onScanSuccess,
    () => {} // silence errors
  ).catch(err => {
    document.getElementById('empty-state').innerHTML =
      `<div class="empty-state-icon">⚠️</div>
       <div class="empty-state-text" style="text-align:center;padding:0 20px">
         Camera access denied.<br>Please allow camera in browser settings and reload.
       </div>`;
  });
}

// ── On scan ──────────────────────────────────────────────────────────────
function onScanSuccess(code) {
  if (!code || scannedCodes.has(code)) return;

  scannedCodes.add(code);
  const now = new Date();
  const item = {
    id: Date.now() + Math.random(),
    code,
    scannedAt: now,
    number: scannedItems.length + 1,
    timeStr: now.toLocaleTimeString('en-GB'),
    dateStr: now.toLocaleDateString('en-GB'),
  };
  scannedItems.push(item);

  // Vibrate
  if (navigator.vibrate) navigator.vibrate(60);

  // Update UI
  updateBadge();
  renderItem(item);
  showFlash(code);

  // Auto-scroll
  const list = document.getElementById('item-list');
  setTimeout(() => list.scrollTop = list.scrollHeight, 50);
}

// ── Render one item ──────────────────────────────────────────────────────
function renderItem(item) {
  const emptyState = document.getElementById('empty-state');
  if (emptyState) emptyState.remove();

  document.getElementById('clear-btn').style.display = 'block';
  document.getElementById('hint-text').textContent = 'Tap Done when finished';

  const card = document.createElement('div');
  card.className = 'item-card';
  card.id = 'item-' + item.id;
  card.innerHTML = `
    <div class="item-num">${item.number}</div>
    <div class="item-info">
      <div class="item-code">${escHtml(item.code)}</div>
      <div class="item-time">${item.timeStr}</div>
    </div>
    <button class="item-del" onclick="removeItem('${item.id}', '${escHtml(item.code)}')">✕</button>
  `;
  document.getElementById('item-list').appendChild(card);
}

// ── Remove item ──────────────────────────────────────────────────────────
function removeItem(id, code) {
  const idx = scannedItems.findIndex(i => String(i.id) === String(id));
  if (idx === -1) return;
  scannedItems.splice(idx, 1);
  scannedCodes.delete(code);

  // Re-number
  scannedItems.forEach((it, i) => { it.number = i + 1; });

  // Remove card
  document.getElementById('item-' + id)?.remove();

  // Update numbers in DOM
  document.querySelectorAll('.item-card').forEach((card, i) => {
    card.querySelector('.item-num').textContent = i + 1;
  });

  updateBadge();

  if (scannedItems.length === 0) {
    document.getElementById('hint-text').textContent = 'Scanning…';
    document.getElementById('clear-btn').style.display = 'none';
    document.getElementById('item-list').innerHTML =
      `<div class="empty-state" id="empty-state">
        <div class="empty-state-icon">📷</div>
        <div class="empty-state-text">Point camera at a QR code</div>
      </div>`;
  }
}

// ── Clear all ────────────────────────────────────────────────────────────
function clearAll() {
  if (!confirm(`Remove all ${scannedItems.length} scanned items?`)) return;
  scannedItems.length = 0;
  scannedCodes.clear();
  updateBadge();
  document.getElementById('item-list').innerHTML =
    `<div class="empty-state" id="empty-state">
      <div class="empty-state-icon">📷</div>
      <div class="empty-state-text">Point camera at a QR code</div>
    </div>`;
  document.getElementById('hint-text').textContent = 'Scanning…';
  document.getElementById('clear-btn').style.display = 'none';
}

// ── Flash banner ─────────────────────────────────────────────────────────
function showFlash(code) {
  const banner = document.getElementById('flash-banner');
  document.getElementById('flash-text').textContent = code;
  banner.classList.add('show');
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => banner.classList.remove('show'), 1600);
}

// ── Badge ─────────────────────────────────────────────────────────────────
function updateBadge() {
  const n = scannedItems.length;
  document.getElementById('count-badge').textContent = `${n} scanned`;
}

// ── Torch ─────────────────────────────────────────────────────────────────
document.getElementById('torch-btn').addEventListener('click', async () => {
  if (!scanner) return;
  try {
    torchOn = !torchOn;
    await scanner.applyVideoConstraints({ advanced: [{ torch: torchOn }] });
    document.getElementById('torch-btn').classList.toggle('active', torchOn);
  } catch {
    alert('Torch not supported on this device/browser.');
    torchOn = false;
  }
});

// ── Go to results ─────────────────────────────────────────────────────────
async function goToResults() {
  if (scanner) {
    try { await scanner.stop(); } catch {}
  }

  // Build results list
  const list = document.getElementById('results-list');
  const n = scannedItems.length;
  document.getElementById('results-sub').textContent =
    `${n} item${n !== 1 ? 's' : ''} scanned`;

  if (n === 0) {
    list.innerHTML = `
      <div class="empty-state" style="height:100%">
        <div class="empty-state-icon" style="opacity:0.3">📋</div>
        <div class="empty-state-text">No items were scanned</div>
      </div>`;
  } else {
    list.innerHTML = scannedItems.map(item => `
      <div class="item-card">
        <div class="item-num">${item.number}</div>
        <div class="item-info">
          <div class="item-code">${escHtml(item.code)}</div>
          <div class="item-time">${item.dateStr} · ${item.timeStr}</div>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('scanner-screen').style.display = 'none';
  document.getElementById('results-screen').classList.add('visible');
}

// ── Scan again ────────────────────────────────────────────────────────────
function scanAgain() {
  document.getElementById('results-screen').classList.remove('visible');
  document.getElementById('scanner-screen').style.display = 'flex';
  initScanner();
}

// ── Excel export ──────────────────────────────────────────────────────────
function exportExcel() {
  const btn = document.getElementById('export-btn');
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> Generating…';

  try {
    const wb = XLSX.utils.book_new();

    // Header row
    const wsData = [
      ['#', 'QR Code / Tag ID', 'Date Scanned', 'Time Scanned']
    ];

    scannedItems.forEach(item => {
      wsData.push([item.number, item.code, item.dateStr, item.timeStr]);
    });

    // Empty row + summary
    wsData.push([]);
    wsData.push(['Total Items:', scannedItems.length, '', '']);

    const ws = XLSX.utils.aoa_to_sheet(wsData);

    // Column widths
    ws['!cols'] = [
      { wch: 6 },
      { wch: 42 },
      { wch: 16 },
      { wch: 14 },
    ];

    // Style header row
    const headerCells = ['A1','B1','C1','D1'];
    headerCells.forEach(addr => {
      if (!ws[addr]) return;
      ws[addr].s = {
        font: { bold: true, color: { rgb: '131110' } },
        fill: { patternType: 'solid', fgColor: { rgb: 'D4A843' } },
        alignment: { horizontal: 'center' },
      };
    });

    XLSX.utils.book_append_sheet(wb, ws, 'Scanned Items');

    const ts = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `GoldScan_${ts}.xlsx`);

  } catch (e) {
    alert('Export failed: ' + e.message);
  }

  setTimeout(() => {
    btn.disabled = false;
    btn.innerHTML = '<span>⬇</span> Download Excel Sheet';
  }, 1500);
}

// ── Util ──────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Start ─────────────────────────────────────────────────────────────────
window.addEventListener('load', initScanner);
</script>
</body>
</html>
